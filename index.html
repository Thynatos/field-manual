<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Summer Ops // Field Manual</title>
<meta name="description" content="Personal summer skills field manual and session tracker.">

<!-- ===== Installable / standalone app meta (iOS + Android) ===== -->
<meta name="theme-color" content="#EAE6DC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Field Manual">
<meta name="application-name" content="Field Manual">
<!-- apple-touch-icon href + web app manifest are generated at runtime (installPWA)
     so the whole thing stays one self-contained file with no external image assets. -->
<link rel="apple-touch-icon" id="appleIcon">
<link rel="icon" id="favIcon" type="image/png">

<!-- Fonts: kept as a link (embedding 6 base64 weights would balloon this single
     file into the hundreds of KB). The app is fully functional OFFLINE because
     every font-family falls back through --font-head / --font-mono to condensed
     and monospace system fonts, so nothing breaks when the stylesheet can't load. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE6DC; --paper-2:#F1EEE6; --line:#B4AC98;
    --ink:#1F2420; --ink-soft:#5B5A4E;
    --rust:#BE6A1F; --teal:#3F5D50; --card:#fff;
    --skip:#8a3b1f;
    --well:#D8D3C4; --skip-bg:#f3ece8; --callout-bg:#f6efe8;
    --allclear-bg:#eef2ee; --done-text:#9a9689; --placeholder:#a8a294;
    --pulse-line:#3a3f39; --pulse-risk-txt:#e8b98f;
    /* Font stacks with offline-safe fallbacks (Oswald is condensed; Arial Narrow
       is the closest widely-installed system substitute). */
    --font-head:'Oswald','Arial Narrow','Helvetica Neue Condensed',Arial,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
    color-scheme:light;
  }
  /* Bedtime-friendly dark variant of the paper aesthetic (toggled via ☾ in the
     header, persisted in fm:_meta). Same ink/rust/teal language, lamp-off paper. */
  [data-theme="dark"]{
    --paper:#1B1D1A; --paper-2:#242720; --line:#3E4238;
    --ink:#E5E0D1; --ink-soft:#A19D8E;
    --rust:#D08A3F; --teal:#7FA893; --card:#232620;
    --skip:#C97B54;
    --well:#2C2F28; --skip-bg:#2A241F; --callout-bg:#282219;
    --allclear-bg:#232B22; --done-text:#6E6B5F; --placeholder:#6E6B5F;
    --pulse-line:#C9C3B2; --pulse-risk-txt:#8a5a26;
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:linear-gradient(var(--line) 1px,transparent 1px);
    background-size:100% 40px;
    color:var(--ink);
    font-family:var(--font-mono);
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 14px 80px;}

  header{border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:14px;}
  .head-row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;}
  .themebtn{flex:0 0 auto;width:38px;height:38px;border:2px solid var(--ink);background:var(--paper-2);color:var(--ink);font-size:16px;line-height:1;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .themebtn:active{transform:translateY(1px);}
  .themebtn:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}
  .eyebrow{font-size:11px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:4px;}
  h1{font-family:var(--font-head);font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:26px;margin:0;}

  /* tab bar */
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 0;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-webkit-mask-image:linear-gradient(to right,transparent 0,#000 14px,#000 calc(100% - 22px),transparent 100%);mask-image:linear-gradient(to right,transparent 0,#000 14px,#000 calc(100% - 22px),transparent 100%);}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;border:2px solid var(--ink);background:var(--paper-2);
    padding:7px 12px;cursor:pointer;font-family:var(--font-head);font-weight:600;
    text-transform:uppercase;font-size:13px;letter-spacing:.03em;color:var(--ink);
    white-space:nowrap;position:relative;-webkit-tap-highlight-color:transparent;
  }
  .tab .wo{font-size:9px;color:var(--ink-soft);display:block;letter-spacing:.08em;}
  .tab.active{background:var(--ink);color:var(--paper);}
  .tab.active .wo{color:var(--line);}
  .tab .ring{
    position:absolute;top:4px;right:5px;width:7px;height:7px;border-radius:50%;
    background:var(--rust);opacity:0;
  }
  .tab.complete .ring{opacity:1;background:#3f5d50;}
  .tab:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}

  section{display:none;}
  section.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .goal{
    background:var(--card);border:2px solid var(--ink);padding:13px 15px;margin-bottom:14px;
  }
  .goal .lbl{font-size:10px;letter-spacing:.12em;color:var(--rust);font-weight:700;margin-bottom:5px;}
  .goal p{margin:0 0 8px;font-size:13.5px;line-height:1.5;}
  .goal p:last-child{margin-bottom:0;}
  .goal .method{color:var(--ink-soft);font-size:12.5px;}

  .block-title{
    font-family:var(--font-head);font-weight:700;text-transform:uppercase;
    font-size:15px;letter-spacing:.04em;margin:20px 0 9px;
    display:flex;align-items:center;gap:8px;
  }
  .block-title::before{content:"";width:14px;height:14px;background:var(--rust);flex:0 0 auto;}
  .block-title.teal::before{background:var(--teal);}

  /* progress */
  .prog{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  .prog-bar{flex:1;height:14px;border:2px solid var(--ink);background:var(--well);display:flex;}
  .prog-fill{background:var(--rust);height:100%;transition:width .25s ease;}
  .prog-num{font-size:12px;color:var(--ink-soft);font-family:var(--font-head);font-weight:600;letter-spacing:.03em;white-space:nowrap;}

  /* stack cards */
  .stack{display:flex;flex-direction:column;gap:7px;}
  .res{
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--teal);
    padding:9px 12px;font-size:12.5px;line-height:1.45;
  }
  .res.skip{border-left-color:var(--skip);background:var(--skip-bg);}
  .res .rname{font-family:var(--font-head);font-weight:600;font-size:13.5px;text-transform:uppercase;letter-spacing:.02em;}
  .res .badge{font-size:9px;border:1px solid currentColor;padding:1px 5px;margin-left:6px;vertical-align:middle;letter-spacing:.05em;}
  .res .badge.free{color:var(--teal);}
  .res .badge.paid{color:var(--rust);}
  .res .badge.skipb{color:var(--skip);}
  .res .rnote{color:var(--ink-soft);margin-top:3px;}

  /* checkable rows */
  .check{
    display:flex;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);
    cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;
  }
  .check:last-child{border-bottom:none;}
  .check:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}
  .box{flex:0 0 auto;width:19px;height:19px;border:2px solid var(--ink);margin-top:1px;background:var(--card);display:flex;align-items:center;justify-content:center;}
  .box svg{width:13px;height:13px;opacity:0;transition:opacity .15s;stroke:var(--paper);}
  .check.done .box{background:var(--ink);}
  .check.done .box svg{opacity:1;}
  .check .ctext{font-size:13px;line-height:1.45;flex:1;}
  .check.done .ctext{color:var(--done-text);text-decoration:line-through;text-decoration-color:var(--line);}
  .cstamp{
    position:absolute;right:6px;top:50%;transform:translateY(-50%) rotate(-8deg) scale(.5);
    opacity:0;border:2px double var(--teal);color:var(--teal);font-family:var(--font-head);
    font-weight:700;font-size:11px;letter-spacing:.06em;padding:1px 6px;pointer-events:none;
    transition:opacity .18s,transform .18s;
  }
  .check.done .cstamp{opacity:.8;transform:translateY(-50%) rotate(-8deg) scale(1);}

  /* activity cards */
  .acts{display:flex;flex-direction:column;gap:7px;}
  .act{
    background:var(--card);border:1px solid var(--line);padding:9px 12px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .act:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}
  .act-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .act-title{font-family:var(--font-head);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.02em;}
  .act-time{font-size:10px;color:var(--rust);border:1px solid var(--rust);padding:1px 5px;white-space:nowrap;flex:0 0 auto;letter-spacing:.04em;}
  .act-desc{font-size:12px;color:var(--ink-soft);line-height:1.45;margin-top:6px;display:none;}
  .act.open .act-desc{display:block;}
  .act-title::before{content:"+ ";color:var(--line);}
  .act.open .act-title::before{content:"– ";}

  /* session logger */
  .logger{background:var(--card);border:2px solid var(--ink);padding:12px 14px;margin:14px 0;}
  .logger-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .logger-stat{font-size:12px;color:var(--ink-soft);line-height:1.4;}
  .logger-stat b{font-family:var(--font-head);font-size:22px;color:var(--ink);display:block;letter-spacing:.02em;}
  .logbtn{
    border:2px solid var(--ink);background:var(--rust);color:#fff;font-family:var(--font-head);
    font-weight:700;text-transform:uppercase;font-size:13px;letter-spacing:.04em;padding:10px 16px;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  .logbtn:active{transform:translateY(1px);}
  .logbtn:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  .logged-today{font-size:10px;color:var(--teal);letter-spacing:.05em;margin-top:4px;}

  /* week plan */
  .week{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);background:var(--card);}
  .wday{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12.5px;line-height:1.45;}
  .wday:last-child{border-bottom:none;}
  .wday .d{font-family:var(--font-head);font-weight:700;color:var(--rust);flex:0 0 66px;text-transform:uppercase;font-size:11px;letter-spacing:.04em;padding-top:1px;}

  /* overview table */
  .otable{border:2px solid var(--ink);background:var(--card);margin-bottom:14px;}
  .orow{display:flex;border-bottom:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .orow:last-child{border-bottom:none;}
  .orow:hover{background:var(--paper-2);}
  .orow .owo{flex:0 0 60px;font-family:var(--font-head);font-weight:700;font-size:12px;padding:11px 8px;color:var(--rust);border-right:1px solid var(--line);letter-spacing:.03em;}
  .orow .obody{flex:1;padding:9px 11px;}
  .orow .oname{font-family:var(--font-head);font-weight:600;text-transform:uppercase;font-size:14px;letter-spacing:.02em;}
  .orow .odesc{font-size:11.5px;color:var(--ink-soft);margin-top:2px;line-height:1.4;}
  .orow .omini{flex:0 0 52px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:11px;color:var(--ink-soft);border-left:1px solid var(--line);}

  .callout{border:2px dashed var(--rust);background:var(--callout-bg);padding:11px 14px;font-size:12.5px;line-height:1.5;margin:14px 0;}
  .callout b{font-family:var(--font-head);letter-spacing:.02em;}

  .admin{display:flex;gap:8px;margin-top:8px;}
  .admin .check{flex:1;border:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--card);padding:10px;}

  footer{margin-top:26px;font-size:10px;color:var(--ink-soft);text-align:center;letter-spacing:.04em;}
  .err{font-size:11px;color:var(--skip);margin-top:8px;display:none;}

  /* streak + dots */
  .streak{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .stat-chip{border:2px solid var(--ink);background:var(--paper-2);padding:3px 8px;font-family:var(--font-head);font-weight:600;font-size:11px;letter-spacing:.03em;text-transform:uppercase;}
  .stat-chip b{color:var(--rust);font-size:13px;}
  .stat-chip.hot{background:var(--rust);color:#fff;border-color:var(--rust);}
  .stat-chip.hot b{color:#fff;}
  .dots-wrap{margin-top:10px;}
  .dots-lbl{font-size:9px;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:4px;}
  .dots{display:flex;gap:3px;}
  .dot{flex:1;height:16px;background:var(--well);border:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .dot.on{background:var(--teal);border-color:var(--teal);}
  .dot.today{border:2px solid var(--ink);}
  .dot:hover{border-color:var(--ink);}
  .undo{background:none;border:1px solid var(--line);color:var(--ink-soft);font-family:var(--font-mono);font-size:10px;padding:3px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:8px;letter-spacing:.04em;}
  .undo:hover{border-color:var(--ink);color:var(--ink);}
  .undo:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}

  /* notes / diary */
  .notes-box{margin-top:8px;}
  textarea.notes{
    width:100%;min-height:78px;resize:vertical;background:var(--card);border:1px solid var(--line);
    border-left:4px solid var(--rust);padding:10px 12px;font-family:var(--font-mono);
    font-size:12.5px;line-height:1.5;color:var(--ink);
  }
  textarea.notes:focus{outline:none;border-left-color:var(--ink);}
  textarea.notes::placeholder{color:var(--placeholder);}
  .notes-saved{font-size:10px;color:var(--teal);letter-spacing:.05em;margin-top:4px;height:12px;transition:opacity .3s;}

  /* overview pulse */
  .pulse{border:2px solid var(--ink);background:var(--ink);color:var(--paper);padding:12px 15px;margin-bottom:14px;}
  .pulse-lbl{font-size:10px;letter-spacing:.12em;color:var(--line);margin-bottom:8px;}
  .pulse-row{display:flex;gap:18px;flex-wrap:wrap;}
  .pulse-stat b{font-family:var(--font-head);font-weight:700;font-size:24px;color:var(--paper);display:block;line-height:1;letter-spacing:.02em;}
  .pulse-stat span{font-size:10px;letter-spacing:.06em;color:var(--line);text-transform:uppercase;}
  .pulse-risk{margin-top:10px;padding-top:9px;border-top:1px solid var(--pulse-line);font-size:11.5px;line-height:1.45;color:var(--pulse-risk-txt);}
  .pulse-risk b{color:var(--paper);font-family:var(--font-head);letter-spacing:.02em;}

  /* today tab */
  .tpulse{font-size:12px;color:var(--ink-soft);margin-bottom:14px;letter-spacing:.02em;line-height:1.6;}
  .tpulse b{color:var(--ink);font-family:var(--font-head);font-weight:600;}
  .hero{border:2px solid var(--ink);background:var(--card);padding:14px 16px;margin-bottom:16px;border-top:6px solid var(--rust);}
  .hero-lbl{font-family:var(--font-head);font-weight:700;font-size:11px;letter-spacing:.14em;color:var(--rust);margin-bottom:8px;}
  .hero-lbl.risk{color:#fff;background:var(--rust);display:inline-block;padding:2px 8px;}
  .hero-lbl.bonus{color:var(--teal);}
  .hero-skill{font-family:var(--font-head);font-weight:700;text-transform:uppercase;font-size:22px;letter-spacing:.01em;line-height:1;}
  .hero-skill .wo{font-size:11px;color:var(--ink-soft);letter-spacing:.06em;}
  .hero-ms{font-size:12.5px;color:var(--ink-soft);margin-top:9px;line-height:1.45;}
  .hero-ms b{color:var(--ink);}
  .hero-act{background:var(--paper-2);border-left:3px solid var(--teal);padding:9px 11px;margin-top:11px;font-size:12.5px;line-height:1.5;}
  .hero-act .at{font-family:var(--font-head);font-weight:600;text-transform:uppercase;font-size:13px;letter-spacing:.02em;}
  .hero-act .atime{font-size:10px;color:var(--rust);border:1px solid var(--rust);padding:1px 5px;margin-left:6px;letter-spacing:.04em;}
  .hero-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .hero-btns button{font-family:var(--font-head);font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:.03em;padding:9px 14px;border:2px solid var(--ink);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .hero-btns .primary{background:var(--rust);color:#fff;}
  .hero-btns .ghost{background:var(--paper-2);color:var(--ink);}
  .hero-btns button:active{transform:translateY(1px);}
  .hero-allclear{border:2px dashed var(--teal);background:var(--allclear-bg);padding:18px;text-align:center;font-family:var(--font-head);font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--teal);margin-bottom:16px;line-height:1.5;font-size:15px;}
  .tgroup-lbl{font-family:var(--font-head);font-weight:700;text-transform:uppercase;font-size:13px;letter-spacing:.05em;margin:18px 0 8px;display:flex;align-items:center;gap:8px;color:var(--ink);}
  .tgroup-lbl::before{content:"";width:12px;height:12px;background:var(--rust);flex:0 0 auto;}
  .tgroup-lbl.flex::before{background:var(--teal);}
  .trow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);padding:10px 12px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .trow.done{opacity:.62;}
  .trow:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}
  .tdot{width:12px;height:12px;border:2px solid var(--ink);flex:0 0 auto;background:var(--card);}
  .trow.done .tdot{background:var(--teal);border-color:var(--teal);}
  .tdot.flex{border-color:var(--teal);border-radius:50%;}
  .tbody{flex:1;min-width:0;}
  .tname{font-family:var(--font-head);font-weight:600;text-transform:uppercase;font-size:14px;letter-spacing:.02em;}
  .tname .tstreak{font-size:10px;color:var(--rust);margin-left:6px;letter-spacing:.03em;}
  .tname .trest{font-size:9px;color:var(--teal);border:1px solid var(--teal);padding:1px 4px;margin-left:6px;letter-spacing:.06em;vertical-align:1px;}
  .tnext{font-size:11.5px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tlog{flex:0 0 auto;font-family:var(--font-head);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.03em;padding:7px 11px;border:2px solid var(--ink);background:var(--rust);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .tlog.done{background:var(--card);color:var(--teal);border-color:var(--teal);}
  .tlog:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

  /* data / backup row (export + import) */
  .datarow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px;margin-top:16px;padding-bottom:env(safe-area-inset-bottom);}
  .datalbl{font-family:var(--font-head);font-weight:700;font-size:10px;letter-spacing:.12em;color:var(--ink-soft);}
  .databtn{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.04em;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);padding:5px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .databtn:hover{border-color:var(--ink);color:var(--ink);}
  .databtn:active{transform:translateY(1px);}
  .databtn:focus-visible{outline:2px solid var(--rust);outline-offset:2px;}
  .datamsg{font-size:10px;color:var(--teal);letter-spacing:.05em;min-height:12px;flex-basis:100%;text-align:center;transition:opacity .3s;}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-row">
      <div>
        <div class="eyebrow">FIELD MANUAL · SUMMER 2026</div>
        <h1>Summer Ops</h1>
      </div>
      <button class="themebtn" id="themeToggle" type="button" title="Toggle bedtime (dark) theme" aria-label="Toggle bedtime theme">☾</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="err" id="err">Couldn't save progress — it may not persist next time.</div>

  <div id="content"></div>

  <footer>ONE COURSE PER SKILL. RUN IT. LOG IT. LET THE TRACKER TELL THE TRUTH.</footer>

  <div class="datarow">
    <span class="datalbl">DATA</span>
    <button class="databtn" id="btnExport" type="button" title="Download a JSON backup of all your progress">Export backup</button>
    <button class="databtn" id="btnImport" type="button" title="Restore from a backup file">Import file</button>
    <button class="databtn" id="btnPaste" type="button" title="Restore from pasted backup text">Paste</button>
    <input type="file" id="importFile" accept="application/json,.json" hidden>
    <span class="datamsg" id="datamsg"></span>
    <span class="datamsg" id="backupNudge" style="color:var(--ink-soft);opacity:1"></span>
  </div>
</div>

<script>
/* ---------- DATA ---------- */

// LOCAL date, not toISOString() (which is UTC and would flip the "day" at 3am
// in Turkey — a bedtime session logged at 1am belongs to that evening's date).
function today(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ---------- STORAGE ABSTRACTION ----------
   The original file only spoke to window.storage (the Claude.ai Artifacts API),
   which is undefined in a normal browser, so opened standalone nothing persisted.
   `store` picks a backend at runtime:
     1. window.storage  — when running inside Claude.ai (unchanged behaviour)
     2. localStorage    — standalone file:// or hosted (the real fix)
     3. in-memory       — last resort so the UI never crashes; set() reports
                          failure so the #err "won't persist" banner shows.
   Key names (fm:*) and the JSON-string value format are preserved, so any data
   already saved under either backend keeps working. get() returns {value} | null,
   exactly the shape the existing callers expect. Everything resolves immediately
   for localStorage, so the calling code's `await` stays valid. */
const store = (function(){
  const mem = {};
  const hasWS = (function(){ try{ return !!(window.storage && typeof window.storage.get==='function' && typeof window.storage.set==='function'); }catch(e){ return false; } })();
  const hasLS = (function(){ try{ const t='__fm_probe__'; window.localStorage.setItem(t,'1'); window.localStorage.removeItem(t); return true; }catch(e){ return false; } })();

  if(hasWS){
    return {
      backend:'artifact',
      async get(k){ try{ const r=await window.storage.get(k); return (r && typeof r.value!=='undefined' && r.value!==null) ? {value:r.value} : null; }catch(e){ return null; } },
      async set(k,v){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } },
      async del(k){ try{ if(typeof window.storage.delete==='function') await window.storage.delete(k); else await window.storage.set(k,''); return true; }catch(e){ return false; } },
      async list(pre){ try{ if(typeof window.storage.list==='function'){ const ks=await window.storage.list(); return (ks||[]).map(x=>typeof x==='string'?x:(x&&(x.key||x.name))||'').filter(k=>k && (!pre||k.indexOf(pre)===0)); } }catch(e){} return null; }
    };
  }
  if(hasLS){
    return {
      backend:'localStorage',
      async get(k){ try{ const v=window.localStorage.getItem(k); return v===null?null:{value:v}; }catch(e){ return null; } },
      async set(k,v){ try{ window.localStorage.setItem(k,v); return true; }catch(e){ return false; } },
      async del(k){ try{ window.localStorage.removeItem(k); return true; }catch(e){ return false; } },
      async list(pre){ try{ const out=[]; for(let i=0;i<window.localStorage.length;i++){ const k=window.localStorage.key(i); if(k && (!pre||k.indexOf(pre)===0)) out.push(k); } return out; }catch(e){ return []; } }
    };
  }
  return {
    backend:'memory',
    async get(k){ return Object.prototype.hasOwnProperty.call(mem,k) ? {value:mem[k]} : null; },
    async set(k,v){ mem[k]=v; return false; }, // false -> caller shows persistence warning
    async del(k){ delete mem[k]; return true; },
    async list(pre){ return Object.keys(mem).filter(k=>!pre||k.indexOf(pre)===0); }
  };
})();

/* ---------- SCHEMA VERSION / MIGRATION ----------
   fm:_meta stamps the saved data with a schema version so future format changes
   can be migrated instead of corrupting old saves. */
const SCHEMA_VERSION = 1;
function migrate(meta){
  // Migrations run in order on the stored meta.schemaVersion.
  // v<1 -> v1: no structural change (per-skill field back-fill already happens
  // defensively in loadState), so this is currently a no-op placeholder.
  return meta;
}
async function ensureMeta(){
  let meta = null;
  const r = await store.get('fm:_meta');
  if(r && r.value){ try{ meta = JSON.parse(r.value); }catch(e){ meta = null; } }
  if(!meta || typeof meta!=='object') meta = {schemaVersion:0, created:today()};
  meta = migrate(meta);
  if(meta.schemaVersion !== SCHEMA_VERSION){ meta.schemaVersion = SCHEMA_VERSION; }
  await store.set('fm:_meta', JSON.stringify(meta));
  return meta;
}
async function patchMeta(patch){ // read-modify-write small fields (theme, lastExport)
  let m = {};
  try{ const r = await store.get('fm:_meta'); if(r && r.value) m = JSON.parse(r.value)||{}; }catch(e){}
  Object.assign(m, patch);
  await store.set('fm:_meta', JSON.stringify(m));
  return m;
}

async function loadState(){
  const meta = await ensureMeta();
  themeDark = meta.theme==='dark';
  applyTheme();
  for(const key of ORDER){
    if(key==='overview'||key==='today')continue;
    state[key] = null;
    try{
      const r = await store.get('fm:'+key);
      if(r && r.value) state[key] = JSON.parse(r.value);
    }catch(e){/* none yet */}
    if(!state[key]) state[key] = {milestones:{},sessions:0,lastLogged:null,log:[],notes:''};
    // migrate older saved state

    if(a && a.value) adminState = JSON.parse(a.value);
  }catch(e){/* none yet */}
  render();
  updateBackupNudge();
}

/* ---------- HELPERS ---------- */
function addDays(iso,n){const d=new Date(iso+'T00:00:00Z');d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function dayDiff(a,b){return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000);}
function formatWhen(iso){
  if(!iso) return '';
  const d = dayDiff(iso,today());
  if(d<=0) return 'today';
  if(d===1) return 'yesterday';
  return d+'d ago';
}
function logDates(key){return new Set(state[key] && state[key].log ? state[key].log : []);}
/* Schedule support: a skill may declare schedule:[weekdays] (gym's 4-day split).
   On non-scheduled days it isn't due — no nag, no at-risk, and the streak chain
   walks scheduled days only, so Wednesday can't break a Mon-Tue-Thu-Fri streak. */
function schedOf(key){const s=SKILLS[key]&&SKILLS[key].schedule;return (s&&s.length)?s:null;}
function isDue(key,iso){const s=schedOf(key);if(!s)return true;return s.includes(new Date(iso+'T12:00:00').getDay());}
function prevDue(key,iso){
  let d=addDays(iso,-1);
  if(!schedOf(key)) return d;
  let guard=8; // a schedule always has a day within a week
  while(!isDue(key,d)&&guard--) d=addDays(d,-1);
  return d;
}
function computeStreak(key){
  const set = logDates(key);
  if(set.size===0) return {current:0,best:0};
  const sched = schedOf(key);
  // best: consecutive DUE days logged (off-schedule bonus logs neither break nor extend)
  const dates = [...set].filter(d=>isDue(key,d)).sort();
  let best=dates.length?1:0, run=1;
  for(let i=1;i<dates.length;i++){
    const consec = sched ? (prevDue(key,dates[i])===dates[i-1]) : (dayDiff(dates[i-1],dates[i])===1);
    if(consec){run++; if(run>best)best=run;} else run=1;
  }
  // current: anchor on today if due + logged, else the most recent due day
  // (grace: the streak doesn't break just because today isn't logged yet)
  let cur=0, d=today();
  if(!(isDue(key,d)&&set.has(d))) d=prevDue(key,d);
  if(set.has(d)&&isDue(key,d)){ cur=1; let p=prevDue(key,d); while(set.has(p)){cur++; p=prevDue(key,p);} }
  return {current:cur, best:Math.max(best,cur)};
}
function weeklyPulse(){
  let sessions=0, prev=0; const skills=new Set();
  ORDER.forEach(key=>{
    if(key==='overview'||key==='today')return;
    (state[key].log||[]).forEach(dt=>{
      const diff=dayDiff(dt,today());
      if(diff>=0 && diff<=6){sessions++; skills.add(key);}
      else if(diff>=7 && diff<=13){prev++;} // same 7-day window, one week back
    });
  });
  return {sessions, skills:skills.size, prev};
}
function streaksAtRisk(){
  // one source of truth with the Today tab (isRiskKey is schedule-aware)
  return DAILY_KEYS.filter(isRiskKey).map(key=>({key,title:SKILLS[key].title,n:computeStreak(key).current}));
}

function skillProgress(key){

  const total = s.milestones.length;

  return {done,total};
}

}

function streakChips(key,s){
  if(s.project) return ''; // project-pace skills deliberately aren't streak-based
  const st = computeStreak(key);
  if(st.current===0 && st.best===0) return '';
  const hot = st.current>=2 ? ' hot' : '';
  return `<div class="streak">
    <div class="stat-chip${hot}"><b>${st.current}</b> day streak</div>
    <div class="stat-chip">best <b>${st.best}</b></div>
  </div>`;
}
function dotStrip(key){
  const set = logDates(key);
  const N = 14;
  let dots='';
  for(let i=N-1;i>=0;i--){
    const dt = addDays(today(),-i);
    const on = set.has(dt);
    const isToday = i===0;
    dots += `<div class="dot${on?' on':''}${isToday?' today':''}" data-day="${dt}" title="${dt} — tap to toggle"></div>`;
  }
  return `<div class="dots-wrap"><div class="dots-lbl">LAST 14 DAYS · TAP A DAY TO FIX IT</div><div class="dots">${dots}</div></div>`;
}
// Tap a dot to fix history: turning a day OFF removes all of that day's entries;
// turning it ON adds one session. lastLogged is recomputed as the latest date.
function toggleDay(key,dt){
  const log = state[key].log || (state[key].log=[]);
  const n = log.filter(x=>x===dt).length;
  if(n>0){ state[key].log = log.filter(x=>x!==dt); state[key].sessions = Math.max(0, state[key].sessions-n); }
  else { log.push(dt); state[key].sessions++; }
  const L = state[key].log;
  state[key].lastLogged = L.length ? L.slice().sort()[L.length-1] : null;
  saveSkill(key); render();
}

/* ---------- BIND ---------- */
function logSession(key){
  state[key].sessions++;
  state[key].lastLogged=today();
  state[key].log = state[key].log || [];
  state[key].log.push(today());
  saveSkill(key); render();
}
function undoSession(key){
  if(state[key].sessions>0) state[key].sessions--;
  const log = state[key].log || [];
  if(log.length){ log.pop(); state[key].lastLogged = log.length ? log[log.length-1] : null; }
  saveSkill(key); render();
}
// Today-tab undo: specifically pull today's log entry back out (used when a row
// or the hero was tapped by mistake). Removes one of today's dates, not just the
// tail, so it stays correct even if an earlier date was somehow appended after.
function undoTodayLog(key){
  const log = state[key].log || [];
  const idx = log.lastIndexOf(today());
  if(idx<0) return; // nothing logged today to undo
  log.splice(idx,1);
  if(state[key].sessions>0) state[key].sessions--;
  state[key].lastLogged = log.length ? log[log.length-1] : null;
  saveSkill(key); render();
}
function bindSkill(key){
  document.querySelectorAll(`#ms-${key} .check`).forEach(row=>{
    const i = +row.dataset.ms;
    const toggle=()=>{
      state[key].milestones[i]=!state[key].milestones[i];
      if(!state[key].milestones[i]) delete state[key].milestones[i];
      saveSkill(key); render();
    };
    row.onclick=toggle;
    row.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}};
  });
  document.querySelectorAll(`#acts-${key} .act`).forEach(a=>{
    const toggle=()=>a.classList.toggle('open');
    a.onclick=toggle;
    a.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}};
  });
  const logBtn = document.querySelector(`[data-log="${key}"]`);
  if(logBtn) logBtn.onclick=()=>logSession(key);
  const undoBtn = document.querySelector(`[data-undo="${key}"]`);
  if(undoBtn) undoBtn.onclick=()=>undoSession(key);
  document.querySelectorAll('.dots .dot').forEach(d=>{
    d.onclick=()=>toggleDay(key, d.dataset.day);
  });
  const notesEl = document.getElementById(`notes-${key}`);
  if(notesEl){
    const savedEl = document.getElementById(`saved-${key}`);
    const persist=()=>{
      state[key].notes = notesEl.value;
      saveSkill(key); // no render, keep focus
      if(savedEl){savedEl.textContent='saved'; savedEl.style.opacity='1';
        clearTimeout(notesEl._fade); notesEl._fade=setTimeout(()=>{savedEl.style.opacity='0';},1400);}
    };
    notesEl.addEventListener('input',()=>{clearTimeout(notesEl._t); notesEl._t=setTimeout(persist,600);});
    notesEl.addEventListener('blur',persist);
  }
}

/* ---------- TODAY ---------- */
function dayOfYear(){ const d=new Date(); return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000); }
function nextMilestone(key){
  const ms = SKILLS[key].milestones||[];
  for(let i=0;i<ms.length;i++){ if(!state[key].milestones[i]) return {text:ms[i],index:i}; }
  return null;
}
function suggestedActivity(key){
  const acts = SKILLS[key].activities||[];
  if(!acts.length) return null;
  return acts[dayOfYear()%acts.length];
}
function last7Count(key){ return (state[key].log||[]).filter(dt=>{const df=dayDiff(dt,today());return df>=0&&df<=6;}).length; }
function isRiskKey(key){
  if(!DAILY_KEYS.includes(key)) return false;
  if(!isDue(key,today())) return false;          // rest day: nothing to protect yet
  const set=logDates(key);
  return set.has(prevDue(key,today())) && !set.has(today()) && computeStreak(key).current>=1;
}
function heroPriority(){
  const risk=[], todo=[];
  DAILY_KEYS.forEach(k=>{
    if(!isDue(k,today())) return;                // rest day (gym Wed/weekend), no nag
    if(logDates(k).has(today())) return;         // already done today, no nag
    if(isRiskKey(k)) risk.push(k); else todo.push(k);
  });
  todo.sort((a,b)=>last7Count(a)-last7Count(b));  // most neglected first
  const flexPending = FLEX_KEYS.filter(k=>nextMilestone(k)); // still has milestones to hit
  return [...risk, ...todo, ...flexPending];
}

/* ---------- DATA: EXPORT / IMPORT (cross-device bridge + backup) ----------
   localStorage is per-device/per-browser, so a phone and a PC never share
   automatically. Export writes every fm:* record to a JSON file; Import reads a
   file (or pasted text), confirms, restores, and re-renders. This is also the
   migration path off the Claude.ai version: export there, import here. */
async function allKeys(){
  const listed = await store.list('fm:');
  if(listed && listed.length) return listed;
  // Backend can't enumerate (e.g. window.storage has no list()): use known keys.
  const ks = SKILL_KEYS.map(k=>'fm:'+k);
  ks.push('fm:admin','fm:_meta');
  return ks;
}
function dataMsg(txt,warn){
  const el = document.getElementById('datamsg');
  if(!el) return;
  el.textContent = txt;
  el.style.color = warn ? 'var(--skip)' : 'var(--teal)';
  el.style.opacity = '1';
  clearTimeout(dataMsg._t);
  dataMsg._t = setTimeout(()=>{ el.style.opacity='0'; }, 3200);
}
async function exportData(){
  try{
    const keys = await allKeys();
    const data = {};
    for(const k of keys){ const r = await store.get(k); if(r && r.value!=null) data[k] = r.value; }
    const payload = {app:'summer-field-manual', schema:SCHEMA_VERSION, exportedAt:new Date().toISOString(), data};
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'field-manual-backup-'+today()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    dataMsg('Exported '+Object.keys(data).length+' records ✓');
    await patchMeta({lastExport:today()});
    updateBackupNudge();
  }catch(e){ dataMsg('Export failed on this device', true); }
}
async function importData(text){
  let payload;
  try{ payload = JSON.parse(text); }
  catch(e){ dataMsg("That wasn't valid JSON", true); return; }
  // Accept our wrapped {app,schema,data:{...}} form or a raw {fm:...} object.
  const data = (payload && payload.data && typeof payload.data==='object') ? payload.data : payload;
  const keys = Object.keys(data||{}).filter(k=>k.indexOf('fm:')===0);
  if(!keys.length){ dataMsg('No fm:* data found in that file', true); return; }
  if(!window.confirm('Import '+keys.length+' record(s)?\n\nThis OVERWRITES the current data on this device.')) return;
  let ok = true;
  for(const k of keys){
    let v = data[k];
    if(typeof v !== 'string') v = JSON.stringify(v); // tolerate object-valued entries
    const r = await store.set(k, v);
    if(!r) ok = false;
  }
  await loadState(); // reloads from storage + re-renders everything
  if(!ok){ showErr(); dataMsg('Imported, but saving failed', true); }
  else dataMsg('Imported '+keys.length+' records ✓');
}
function bindData(){
  const ex = document.getElementById('btnExport');
  const im = document.getElementById('btnImport');
  const pa = document.getElementById('btnPaste');
  const file = document.getElementById('importFile');
  if(ex) ex.onclick = exportData;
  if(im && file){
    im.onclick = ()=>file.click();
    file.onchange = ()=>{
      const f = file.files && file.files[0];
      if(!f) return;
      const rd = new FileReader();
      rd.onload = ()=>{ importData(String(rd.result)); file.value=''; };
      rd.onerror = ()=>{ dataMsg("Couldn't read that file", true); file.value=''; };
      rd.readAsText(f);
    };
  }
  if(pa) pa.onclick = ()=>{ const t = window.prompt('Paste your backup JSON here:'); if(t) importData(t); };
}
/* Quiet reminder in the Data row: localStorage can be evicted by the browser,
   so if there's real progress and no export in 14+ days, say so. */
async function updateBackupNudge(){
  const el = document.getElementById('backupNudge');
  if(!el) return;
  const any = SKILL_KEYS.some(k=>{
    const s = state[k];
    return s && (s.sessions>0 || Object.keys(s.milestones||{}).length>0 || (s.notes||'').length>0);
  });
  if(!any){ el.textContent=''; return; }
  let meta = {};
  try{ const r = await store.get('fm:_meta'); if(r && r.value) meta = JSON.parse(r.value)||{}; }catch(e){}
  if(!meta.lastExport){ el.textContent = 'no backup yet — export a copy sometime'; return; }
  const d = dayDiff(meta.lastExport, today());
  el.textContent = d>14 ? ('last backup '+d+'d ago — export a fresh copy') : '';
}

/* ---------- INSTALLABLE APP (icons + web manifest) ----------
   Icons are drawn on a canvas at runtime and injected as data URIs, so there are
   no external image files — the whole app stays one .html. The apple-touch-icon +
   apple-mobile-web-app-* meta let iOS "Add to Home Screen" launch it fullscreen.
   NOTE / limitation: Chrome's PWA install requires an https origin AND a service
   worker, neither of which a single file:// document can provide, so a blob-URL
   manifest won't make Android show an install prompt when opened as a local file.
   It IS honoured if you ever host this file over http(s). The iOS home-screen path
   works regardless, so that's the prioritised install route. */
function makeIcon(size){
  try{
    const s = size, c = document.createElement('canvas');
    c.width = c.height = s;
    const x = c.getContext('2d');
    if(!x) return null;
    x.fillStyle = '#EAE6DC'; x.fillRect(0,0,s,s);                    // paper
    x.strokeStyle = 'rgba(180,172,152,0.55)'; x.lineWidth = Math.max(1,s/128);
    for(let y=s*0.2; y<s*0.98; y+=s*0.14){ x.beginPath(); x.moveTo(s*0.06,y); x.lineTo(s*0.94,y); x.stroke(); } // rule lines
    const bw = Math.max(2,s*0.05); x.strokeStyle = '#1F2420'; x.lineWidth = bw;
    x.strokeRect(bw/2,bw/2,s-bw,s-bw);                               // ink border
    x.fillStyle = '#1F2420'; x.textAlign = 'center'; x.textBaseline = 'alphabetic';
    x.font = '700 '+Math.round(s*0.5)+'px "Arial Narrow",Arial,sans-serif';
    x.fillText('SO', s*0.5, s*0.62);                                 // monogram
    x.fillStyle = '#BE6A1F'; x.fillRect(s*0.3, s*0.7, s*0.4, s*0.055); // rust underline
    return c.toDataURL('image/png');
  }catch(e){ return null; }
}
function installPWA(){
  const i180 = makeIcon(180), i192 = makeIcon(192), i512 = makeIcon(512);
  const setHref = (id,href)=>{ const el = document.getElementById(id); if(el && href) el.href = href; };
  setHref('appleIcon', i180);
  setHref('favIcon', i192);
  try{
    const manifest = {
      name:'Summer Ops — Field Manual', short_name:'Field Manual',
      description:'Personal summer skills field manual and session tracker.',
      start_url:'.', scope:'.', display:'standalone', orientation:'portrait',
      background_color:'#EAE6DC', theme_color:'#EAE6DC', icons:[]
    };
    if(i192) manifest.icons.push({src:i192, sizes:'192x192', type:'image/png', purpose:'any'});
    if(i512) manifest.icons.push({src:i512, sizes:'512x512', type:'image/png', purpose:'any maskable'});
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    const url = URL.createObjectURL(blob);
    let m = document.querySelector('link[rel="manifest"]');
    if(!m){ m = document.createElement('link'); m.rel = 'manifest'; document.head.appendChild(m); }
    m.href = url;
  }catch(e){/* manifest is best-effort */}
  // Hosted upgrade: when served over https (or localhost), register the sidecar
  // service worker and prefer the real manifest file if one is deployed alongside.
  // This is what makes Android Chrome offer a true "Install app" (standalone
  // window, offline cache). Silently skipped on plain file:// — the file stays
  // fully self-contained without the sidecars.
  try{
    if(('serviceWorker' in navigator) && (location.protocol==='https:' || ['localhost','127.0.0.1'].includes(location.hostname))){
      navigator.serviceWorker.register('sw.js').catch(()=>{});
      fetch('manifest.webmanifest',{method:'HEAD'}).then(r=>{
        if(r.ok){ const m=document.querySelector('link[rel="manifest"]'); if(m) m.href='manifest.webmanifest'; }
      }).catch(()=>{});
    }
  }catch(e){/* best-effort */}
}
